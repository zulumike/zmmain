<!DOCTYPE html>
<html lang="no">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZM Handlevogn</title>
    <link rel="stylesheet" type="text/css" href="../styles/general.css" />
    <link rel="stylesheet" type="text/css" href="./styles/nav.css" />
    <link rel="stylesheet" type="text/css" href="./styles/shop.css" />
    </head>
    <body>
        <header>
            <nav id="navbar">
                <div class="burger">
                    <h1>Handleliste</h1>
                </div>
            </nav>
        </header>
        <main>
            <div>
                <!-- <label for="liveMode">Live modus</label>
                <input type="checkbox" id="liveMode"> -->

                <label for="selectStore">Butikk:</label>
                <select name="selectStore" id="selectStore">
                    <option value="Generell"></option>
                </select>

            </div>
            <div class="form-div">
                <form id="itemForm" action="">
                    <input type="text" name="item-name" id="itemName" placeholder="Vare" list="itemSuggestions" autocomplete="off" required>
                    <ul id="itemSuggestionUl" hidden></ul>
                    <datalist id="itemSuggestions"></datalist>
                    <input type="number" name="item-amount" id="itemAmount" placeholder="1" value="1" required>
                    <select name="item-category" id="itemCategory"></select>
                    <button type="submit" id="itemSubmitBtn">Legg til</button>
                    <button type="button" id="delShopListBtn">Slett handlelisten</button>
                </form>
            </div>
            <div class="table-div">
                <table>
                    <h2>Handleliste</h2>
                    <tbody id="shopListBody"></tbody>
                </table>
            </div>
            <div class="table-div">
                <h2 id="inCartHeader">I handlekurven</h2>
                <table>
                    <tbody id="shopCartBody"></tbody>
                </table>
            </div>
            <div id="showMessage" role="status" aria-live="polite"></div>
        </main>
        <script src="./scripts/nav.js"></script>
        <script type="module" src="index.js"></script>
  </body>
</html>
